# Development environment: simulates a 3-node site (1 CP + 2 MFTs)
# with SPIRE identity and Zenoh data fabric.
#
# Usage:
#   docker compose -f ops/docker/dev-compose.yml up --build
#
# This provides a LAN-like environment for testing mDNS discovery,
# WireGuard overlay, SPIRE identity, and Zenoh pub/sub.

services:
  # --- SPIRE Server (site CA) ---
  spire-server:
    image: ghcr.io/spiffe/spire-server:1.12.1
    container_name: spire-server
    hostname: spire-server
    volumes:
      - spire-server-data:/opt/spire/data
      - ./spire-dev/server.conf:/opt/spire/conf/server/server.conf:ro
    command: ["-config", "/opt/spire/conf/server/server.conf"]
    networks:
      mesh-lan:
        ipv4_address: 172.28.0.2

  # --- Zenoh Router (site CP) ---
  zenoh-router:
    image: eclipse/zenoh:1.8.0
    container_name: zenoh-router
    hostname: zenoh-router
    volumes:
      - ../../config/zenoh/cp-router.json5:/zenoh.json5:ro
    command: ["-c", "/zenoh.json5"]
    networks:
      mesh-lan:
        ipv4_address: 172.28.0.3

  # --- Command Post node ---
  cp:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile.meshd
    container_name: cp-node
    hostname: cp-node
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    volumes:
      - cp-data:/var/lib/meshd
    environment:
      - RUST_LOG=info,meshd=debug
    command: ["meshd", "--key-file", "/var/lib/meshd/secret.key", "--no-relay"]
    depends_on:
      - spire-server
      - zenoh-router
    networks:
      mesh-lan:
        ipv4_address: 172.28.0.10

  # --- MFT nodes ---
  mft-01:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile.meshd
    container_name: mft-01
    hostname: mft-01
    cap_add:
      - NET_ADMIN
    volumes:
      - mft01-data:/var/lib/meshd
    environment:
      - RUST_LOG=info,meshd=debug
    command: ["meshd", "--key-file", "/var/lib/meshd/secret.key", "--no-relay"]
    depends_on:
      - spire-server
    networks:
      mesh-lan:
        ipv4_address: 172.28.0.11

  mft-02:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile.meshd
    container_name: mft-02
    hostname: mft-02
    cap_add:
      - NET_ADMIN
    volumes:
      - mft02-data:/var/lib/meshd
    environment:
      - RUST_LOG=info,meshd=debug
    command: ["meshd", "--key-file", "/var/lib/meshd/secret.key", "--no-relay"]
    depends_on:
      - spire-server
    networks:
      mesh-lan:
        ipv4_address: 172.28.0.12

networks:
  mesh-lan:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  cp-data:
  mft01-data:
  mft02-data:
  spire-server-data:

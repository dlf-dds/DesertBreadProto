server {
    bind_address = "0.0.0.0"
    bind_port = "8081"
    trust_domain = "dev.desertbread.net"
    data_dir = "/opt/spire/data"
    log_level = "INFO"

    ca_ttl = "168h"
    default_x509_svid_ttl = "4h"
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "/opt/spire/data/datastore.sqlite3"
        }
    }

    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "memory" {
        plugin_data {}
    }
}

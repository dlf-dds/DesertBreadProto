# SPIRE Server configuration template
# One per site — sovereign CA for the site's trust domain
#
# Variables to substitute:
#   TRUST_DOMAIN — e.g., alpha.desertbread.net
#   BIND_ADDRESS — e.g., 0.0.0.0
#   DATA_DIR     — e.g., /var/lib/spire/server

server {
    bind_address = "${BIND_ADDRESS}"
    bind_port    = "8081"
    trust_domain = "${TRUST_DOMAIN}"
    data_dir     = "${DATA_DIR}"
    log_level    = "INFO"

    ca_ttl       = "168h"    # 7 days — intermediate CA cert lifetime
    default_x509_svid_ttl = "4h"  # Short-lived workload certs
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "${DATA_DIR}/datastore.sqlite3"
        }
    }

    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "disk" {
        plugin_data {
            keys_path = "${DATA_DIR}/keys"
        }
    }

    UpstreamAuthority "disk" {
        plugin_data {
            cert_file_path = "${DATA_DIR}/intermediate-ca.crt"
            key_file_path  = "${DATA_DIR}/intermediate-ca.key"
            bundle_file_path = "${DATA_DIR}/root-ca.crt"
        }
    }
}

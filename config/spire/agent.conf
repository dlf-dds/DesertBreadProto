# SPIRE Agent configuration template
# Runs on every node — attests identity and provides Workload API
#
# Variables to substitute:
#   SPIRE_SERVER   — e.g., 100.64.x.x:8081 (CP overlay IP)
#   TRUST_DOMAIN   — e.g., alpha.desertbread.net
#   DATA_DIR       — e.g., /var/lib/spire/agent

agent {
    data_dir     = "${DATA_DIR}"
    log_level    = "INFO"
    trust_domain = "${TRUST_DOMAIN}"
    server_address = "${SPIRE_SERVER}"
    server_port    = "8081"

    socket_path  = "/tmp/spire-agent/public/api.sock"
}

plugins {
    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "disk" {
        plugin_data {
            directory = "${DATA_DIR}/keys"
        }
    }

    WorkloadAttestor "unix" {
        plugin_data {}
    }
}
